[tool.black]
line-length = 100

[tool.ruff]
line-length = 100
select = ["E", "F", "I"]

# ADD THIS LINE: Tells Ruff to skip your virtual environment files
exclude = ["Lib", "Scripts", "Include", "pyvenv.cfg", ".claude"]

[tool.mypy]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "shared.schemas.*"
strict = true