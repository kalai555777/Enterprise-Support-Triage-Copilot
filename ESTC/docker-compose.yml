networks:
  estc-net:
    driver: bridge

volumes:
  postgres_data:

services:
  classifier-api:
    build:
      context: ./estc/services/classifier_api
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - estc-net

  orchestrator-app:
    build:
      context: ./estc/services/orchestrator
    networks:
      - estc-net

  ui-client:
    build:
      context: ./estc/services/ui
    networks:
      - estc-net

  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-estc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-estc}
      POSTGRES_DB: ${POSTGRES_DB:-estc}
    ports:
      - "5432:5432"
    volumes:
      - ./estc/infra/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./estc/infra/sql/grants.sql:/docker-entrypoint-initdb.d/02-grants.sql
      - ./estc/infra/sql/seed.sql:/docker-entrypoint-initdb.d/03-seed.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - estc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-postgres-server:
    build:
      context: ./estc/services/mcp_postgres
    container_name: mcp-postgres-server
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-estc}
      POSTGRES_READER_USER: ${POSTGRES_READER_USER:-estc_reader}
      POSTGRES_READER_PASSWORD: ${POSTGRES_READER_PASSWORD:-estc_reader_dev_pw}
    depends_on:
      postgres-db:
        condition: service_healthy
    stdin_open: true
    tty: true
    mem_limit: 256m
    networks:
      - estc-net

  mcp-github-server:
    build:
      context: ./estc/services/mcp_github
    container_name: mcp-github-server
    environment:
      GITHUB_PAT: ${GITHUB_PAT:-}
      GITHUB_MOCK_PATH: /app/fixtures/github_mock.json
    volumes:
      - ./estc/tests/fixtures:/app/fixtures:ro
    stdin_open: true
    tty: true
    mem_limit: 256m
    networks:
      - estc-net
