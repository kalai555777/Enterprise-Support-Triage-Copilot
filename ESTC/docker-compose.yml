networks:
  estc-net:
    driver: bridge

volumes:
  postgres_data:

services:
  classifier-api:
    build:
      context: ./estc/services/classifier_api
    ports:
      - "8001:8001"
    healthcheck:
      # python:3.11-slim ships no curl — probe /healthz with urllib (consistent w/ orchestrator).
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - estc-net

  orchestrator-app:
    build:
      # Repo-root context: the Dockerfile copies the whole estc/* tree (the app imports
      # across shared, graph, rag, and the in-process MCP tool modules).
      context: .
      dockerfile: estc/services/orchestrator/Dockerfile
    container_name: orchestrator-app
    ports:
      - "8002:8002"
    environment:
      CLASSIFIER_API_URL: http://classifier-api:8001
      POSTGRES_HOST: postgres-db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-estc}
      POSTGRES_READER_USER: ${POSTGRES_READER_USER:-estc_reader}
      POSTGRES_READER_PASSWORD: ${POSTGRES_READER_PASSWORD:-estc_reader_dev_pw}
      # Deterministic offline triage (matches the test suite + spec AC-B5): the in-process
      # GitHub tool falls back to GITHUB_MOCK_PATH when GITHUB_PAT is empty. Left empty on
      # purpose — the real-API path in the Phase 3.2 GitHub server raises IndexError on an
      # empty issue search, which is a separate (out-of-scope) bug to harden there.
      GITHUB_PAT: ""
      GITHUB_MOCK_PATH: /app/estc/tests/fixtures/github_mock.json
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-estc-dev}
    volumes:
      # Persisted RAG store (built by rag/ingest.py); CHROMA_PATH is the relative ./chroma_db.
      # Mounted read-WRITE: chromadb >=1.x opens the SQLite store in write mode (WAL/journal)
      # even for pure reads, so a :ro mount fails with "attempt to write a readonly database".
      - ./chroma_db:/app/chroma_db
    depends_on:
      classifier-api:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    healthcheck:
      # python:3.11-slim ships no curl — probe /healthz with urllib instead.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/healthz').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - estc-net

  ui-client:
    build:
      context: ./estc/services/ui
    networks:
      - estc-net

  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-estc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-estc}
      POSTGRES_DB: ${POSTGRES_DB:-estc}
    ports:
      - "5432:5432"
    volumes:
      - ./estc/infra/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./estc/infra/sql/grants.sql:/docker-entrypoint-initdb.d/02-grants.sql
      - ./estc/infra/sql/seed.sql:/docker-entrypoint-initdb.d/03-seed.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - estc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-postgres-server:
    build:
      context: ./estc/services/mcp_postgres
    container_name: mcp-postgres-server
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-estc}
      POSTGRES_READER_USER: ${POSTGRES_READER_USER:-estc_reader}
      POSTGRES_READER_PASSWORD: ${POSTGRES_READER_PASSWORD:-estc_reader_dev_pw}
    depends_on:
      postgres-db:
        condition: service_healthy
    stdin_open: true
    tty: true
    mem_limit: 256m
    networks:
      - estc-net

  mcp-github-server:
    build:
      context: ./estc/services/mcp_github
    container_name: mcp-github-server
    environment:
      GITHUB_PAT: ${GITHUB_PAT:-}
      GITHUB_MOCK_PATH: /app/fixtures/github_mock.json
    volumes:
      - ./estc/tests/fixtures:/app/fixtures:ro
    stdin_open: true
    tty: true
    mem_limit: 256m
    networks:
      - estc-net
